name: Build Multi-OS App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build application (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onefile --windowed --icon=assets/icon.ico --add-data "assets;assets" main.py

      - name: Build application (Linux)
        if: runner.os == 'Linux'
        run: |
          pyinstaller --onefile --windowed --add-data "assets:assets" main.py

      - name: Build application (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --onefile --windowed --add-data "assets:assets" main.py

      - name: Rename binary
        run: |
          mkdir release
        shell: bash

      - name: Move Windows build
        if: runner.os == 'Windows'
        run: |
          move dist\main.exe release\app-windows.exe
        shell: cmd

      - name: Move Linux build
        if: runner.os == 'Linux'
        run: |
          mv dist/main release/app-linux
        shell: bash

      - name: Move macOS build
        if: runner.os == 'macOS'
        run: |
          mv dist/main release/app-macos
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ runner.os }}
          path: release/*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*